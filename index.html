<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bookmarks</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

ul {
  list-style-type: none;
  padding-left: 20px;
}

li {
  margin: 2px 0;
}

.folder {
  cursor: pointer;
  font-weight: bold;
}

.folder::before {
  content: "📁 ";
}

.bookmark::before {
  content: "🔗 ";
}

.nested {
  display: none;
}

.open {
  display: block;
}

.toggle {
  cursor: pointer;
  margin-right: 5px;
  color: #666;
}
</style>
</head>
<body>

<h2>Bookmarks</h2>
<div id="bookmarks"></div>

<script>
fetch("bookmarks.html")
  .then(r => r.text())
  .then(text => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, "text/html");
    const rootDL = doc.querySelector("DL");
    const tree = parseDL(rootDL);
    document.getElementById("bookmarks").appendChild(tree);
  });

function parseDL(dl) {
  const ul = document.createElement("ul");

  let node = dl.firstChild;

  while (node) {
    if (node.nodeName === "DT") {
      const li = document.createElement("li");

      const h3 = node.querySelector("H3");
      const a = node.querySelector("A");

      if (h3) {
        const toggle = document.createElement("span");
        toggle.textContent = "▶";
        toggle.className = "toggle";

        const folder = document.createElement("span");
        folder.textContent = h3.textContent;
        folder.className = "folder";

        li.appendChild(toggle);
        li.appendChild(folder);

        let next = node.nextSibling;
        while (next && next.nodeName !== "DL") {
          next = next.nextSibling;
        }

        if (next) {
          const childUL = parseDL(next);
          childUL.classList.add("nested");
          li.appendChild(childUL);

          toggle.onclick = () => {
            childUL.classList.toggle("open");
            toggle.textContent =
              childUL.classList.contains("open") ? "▼" : "▶";
          };
        }
      }

      if (a) {
        const link = document.createElement("a");
        link.href = a.href;
        link.textContent = a.textContent;
        link.target = "_blank";
        link.className = "bookmark";
        li.appendChild(link);
      }

      ul.appendChild(li);
    }

    node = node.nextSibling;
  }

  return ul;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bookmarks</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffffff;
  margin: 20px;
}

h1 {
  font-size: 22px;
}

ul {
  list-style-type: none;
  padding-left: 20px;
}

li {
  line-height: 1.6em;
}

.folder::before {
  content: "📁 ";
}

.bookmark::before {
  content: "🔗 ";
}

.toggle {
  cursor: pointer;
  margin-right: 5px;
  color: #555;
}

.nested {
  display: none;
}

.active {
  display: block;
}

a {
  text-decoration: none;
  color: #0645ad;
}

a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h1>My Bookmarks</h1>
<div id="tree"></div>

<script>
fetch('bookmarks.html')
  .then(response => response.text())
  .then(text => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'text/html');
    const rootDL = doc.querySelector('dl');
    const tree = document.getElementById('tree');
    tree.appendChild(convertDL(rootDL));
  });

function convertDL(dl) {
  const ul = document.createElement('ul');

  Array.from(dl.children).forEach(node => {
    if (node.tagName === 'DT') {
      const h3 = node.querySelector('h3');
      const a = node.querySelector('a');

      const li = document.createElement('li');

      if (h3) {
        const span = document.createElement('span');
        span.textContent = '▶';
        span.className = 'toggle';

        const folder = document.createElement('span');
        folder.textContent = h3.textContent;
        folder.className = 'folder';

        li.appendChild(span);
        li.appendChild(folder);

        const nextDL = node.nextElementSibling;
        if (nextDL) {
          const nested = convertDL(nextDL);
          nested.classList.add('nested');
          li.appendChild(nested);

          span.onclick = () => {
            nested.classList.toggle('active');
            span.textContent = nested.classList.contains('active') ? '▼' : '▶';
          };
        }
      }

      if (a) {
        const link = document.createElement('a');
        link.href = a.href;
        link.textContent = a.textContent;
        link.className = 'bookmark';
        li.appendChild(link);
      }

      ul.appendChild(li);
    }
  });

  return ul;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Bookmarks</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

/* Style bookmark lists */
dl {
  margin-left: 20px;
}

dt {
  margin: 3px 0;
}

/* Folder style */
h3 {
  font-size: 16px;
  margin: 5px 0;
}

/* Links */
a {
  text-decoration: none;
  color: #0645ad;
}

a:hover {
  text-decoration: underline;
}

/* Add icons */
h3::before {
  content: "📁 ";
}

a::before {
  content: "🔗 ";
}
</style>

</head>
<body>

<h1>Bookmarks</h1>

<!-- Embed bookmarks file -->
<object data="bookmarks.html" type="text/html" width="100%" height="800px"></object>

</body>
</html>

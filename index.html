<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Bookmarks</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    ul { list-style-type: none; }
    li { margin: 5px 0; }
    .folder { cursor: pointer; font-weight: bold; }
    .nested { display: none; margin-left: 20px; }
    .active { display: block; }
  </style>
</head>
<body>

<h1>My Bookmarks</h1>
<div id="bookmarks"></div>

<script>
fetch('bookmarks.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('bookmarks').innerHTML = data;

    document.querySelectorAll('dt > h3').forEach(folder => {
      folder.classList.add('folder');
      folder.onclick = () => {
        let next = folder.parentElement.nextElementSibling;
        if (next) next.classList.toggle('active');
      };
    });
  });
</script>

</body>
</html>

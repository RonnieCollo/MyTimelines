<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyTimelines</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

#sidebar {
    width: 540px; /* 80% wider initial width */
    min-width: 150px;
    max-width: 600px;
    overflow-y: auto;
    border-right: 1px solid #ccc;
    padding: 10px;
    box-sizing: border-box;
    font-size: 0.9em; /* slightly smaller font */
}

#divider {
    width: 5px;
    cursor: col-resize;
    background-color: #ddd;
}

#content {
    flex: 1;
    border: none;
}

ul { list-style-type: none; padding-left: 20px; margin: 0; }
li { margin: 3px 0; }
.folder { cursor: pointer; font-weight: bold; }
.folder::before { content: "▶ "; display: inline-block; width: 1em; }
.folder.expanded::before { content: "▼ "; }
a { text-decoration: none; color: #0645AD; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="sidebar">
    <h2>MyTimelines</h2>
    <div id="bookmarks"></div>
</div>

<div id="divider"></div>

<iframe id="content" src=""></iframe>

<script>
// Recursive function to build bookmarks tree
function parseDL(dl) {
    const ul = document.createElement('ul');
    Array.from(dl.children).forEach(dt => {
        if (dt.tagName !== 'DT') return;

        const folder = dt.querySelector('H3');
        const bookmark = dt.querySelector('A');

        if (folder) {
            const li = document.createElement('li');
            const span = document.createElement('span');
            span.textContent = folder.textContent;
            span.className = 'folder';
            span.addEventListener('click', () => {
                span.classList.toggle('expanded');
                const childUl = li.querySelector('ul');
                if (childUl) childUl.style.display = childUl.style.display === 'none' ? 'block' : 'none';
            });
            li.appendChild(span);

            const nestedDL = dt.querySelector('DL');
            if (nestedDL) {
                const childUl = parseDL(nestedDL);
                childUl.style.display = 'none';
                li.appendChild(childUl);
            }
            ul.appendChild(li);
        } else if (bookmark) {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = bookmark.href;
            a.textContent = bookmark.textContent;
            a.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('content').src = bookmark.href;
            });
            li.appendChild(a);
            ul.appendChild(li);
        }
    });
    return ul;
}

// Load bookmarks HTML
fetch('bookmarks.html')
.then(response => response.text())
.then(htmlText => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, 'text/html');
    const topDL = doc.querySelector('DL');
    if (topDL) {
        const tree = parseDL(topDL);
        document.getElementById('bookmarks').appendChild(tree);
    }
})
.catch(err => console.error('Error loading bookmarks:', err));

// Resizable divider
const divider = document.getElementById('divider');
const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');
let isDragging = false;

divider.addEventListener('mousedown', e => {
    isDragging = true;
    document.body.style.cursor = 'col-resize';
});

document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    let newWidth = e.clientX;
    if (newWidth < 150) newWidth = 150;  // min width
    if (newWidth > 600) newWidth = 600;  // max width
    sidebar.style.width = newWidth + 'px';
    content.style.width = `calc(100% - ${newWidth + 5}px)`; // 5px divider width
});

document.addEventListener('mouseup', e => {
    if (isDragging) {
        isDragging = false;
        document.body.style.cursor = 'default';
    }
});
</script>

</body>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const folders = document.querySelectorAll("dt > h3");

  folders.forEach(folder => {
    const childDL = folder.nextElementSibling;
    if (!childDL || childDL.tagName !== "DL") return;

    // Create arrow toggle
    const toggle = document.createElement("span");
    toggle.textContent = "▶";
    toggle.style.cursor = "pointer";
    toggle.style.marginRight = "5px";
    folder.prepend(toggle);

    // Function to toggle this folder
    const toggleFolder = () => {
      childDL.classList.toggle("open");
      toggle.textContent = childDL.classList.contains("open") ? "▼" : "▶";
    };

    // Click arrow or folder name
    toggle.onclick = toggleFolder;
    folder.onclick = toggleFolder;

    // Start closed
    childDL.classList.add("closed");
  });
});
</script>

<style>
/* Nested DL indentation */
dl {
  margin-left: 20px;
  padding-left: 0;
}

/* Closed folders hide children */
dl.closed {
  display: none;
}
dl.open {
  display: block;
}
</style>

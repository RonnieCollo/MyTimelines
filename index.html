<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookmarks Viewer</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
  }
  #container {
    display: flex;
    height: 100%;
  }
  #leftPane {
    width: 80%;
    font-size: 0.9em; /* slightly smaller font */
    overflow: auto;
    padding: 10px;
    background: #f5f5f5;
  }
  #divider {
    width: 5px;
    cursor: ew-resize;
    background: #aaa;
  }
  #rightPane {
    flex: 1;
    border: none;
  }
  ul { list-style-type: none; padding-left: 20px; }
  .folder > span {
    cursor: pointer;
    user-select: none;
  }
  .folder > span::before {
    content: "▶";
    display: inline-block;
    width: 1em;
    margin-right: 5px;
    transform: rotate(0deg);
    transition: transform 0.2s;
  }
  .folder.expanded > span::before {
    transform: rotate(90deg);
  }
  .folder ul { display: none; }
  .folder.expanded ul { display: block; }
  button { margin-bottom: 10px; }
</style>
</head>
<body>

<div id="container">
  <div id="leftPane">
    <button id="collapseBtn">Collapse All from Level 2</button>
    <div id="bookmarks">
      <!-- Bookmarks will be dynamically inserted here -->
    </div>
  </div>
  <div id="divider"></div>
  <iframe id="rightPane"></iframe>
</div>

<script>
// Example bookmarks data (nested)
const bookmarksData = [
  { title: "Home", children: [] },
  { title: "MySeas", children: [
      { title: "C-MAP Viewer", url: "https://www.c-map.com/fr-fr/chartexplorer/" },
      { title: "OpenSeaMap", url: "https://map.openseamap.org/" },
      { title: "Garmin Maps", url: "https://maps.garmin.com/fr-FR/marine?maps=another-brand&overlay=false&key=9z1fmr1ux877" }
    ]
  },
  { title: "MyRuins", children: [
      { title: "Our collections: sea charts and maps", url: "https://www.rmg.co.uk/collections/our-collections-sea-charts-maps" },
      { title: "Historia", children: [
          { title: "Cradle of Civilization", url: "https://en.wikipedia.org/wiki/Cradle_of_civilization" },
          { title: "Timelines", children: [
              { title: "Timeline Project", url: "https://thetimelineproj.sourceforge.net/" },
              { title: "History Atlas", url: "https://www.historyatlas.com/" }
            ]
          }
        ]
      }
    ]
  }
];

// Recursive function to build nested bookmarks
function buildBookmarks(data, parent, level=1) {
  const ul = document.createElement('ul');
  data.forEach(item => {
    const li = document.createElement('li');
    if (item.children && item.children.length > 0) {
      li.classList.add('folder');
      li.dataset.level = level;
      const span = document.createElement('span');
      span.textContent = item.title;
      span.addEventListener('click', () => {
        li.classList.toggle('expanded');
      });
      li.appendChild(span);
      li.appendChild(buildBookmarks(item.children, li, level+1));
    } else if (item.url) {
      const a = document.createElement('a');
      a.href = item.url;
      a.textContent = item.title;
      a.target = 'rightPane';
      li.appendChild(a);
    }
    ul.appendChild(li);
  });
  return ul;
}

document.getElementById('bookmarks').appendChild(buildBookmarks(bookmarksData));

// Collapse button (from level 2 down)
document.getElementById('collapseBtn').addEventListener('click', () => {
  const folders = document.querySelectorAll('#bookmarks .folder');
  folders.forEach(folder => {
    const level = parseInt(folder.dataset.level);
    if (level >= 2) { // collapse level 2 and deeper
      folder.classList.remove('expanded');
    }
  });
});

// Divider drag for resizing
const divider = document.getElementById('divider');
const leftPane = document.getElementById('leftPane');
let isDragging = false;

divider.addEventListener('mousedown', e => { isDragging = true; });
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  let newWidth = e.clientX;
  if (newWidth < 100) newWidth = 100;
  if (newWidth > window.innerWidth - 100) newWidth = window.innerWidth - 100;
  leftPane.style.width = newWidth + 'px';
});
document.addEventListener('mouseup', e => { isDragging = false; });
</script>

</body>
</html>

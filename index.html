<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bookmarks</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

ul {
  list-style-type: none;
  padding-left: 20px;
}

li {
  margin: 3px 0;
}

.folder {
  cursor: pointer;
  font-weight: bold;
}

.folder::before {
  content: "📁 ";
}

.bookmark::before {
  content: "🔗 ";
}

.nested {
  display: none;
}

.open {
  display: block;
}

.toggle {
  cursor: pointer;
  margin-right: 5px;
}
</style>
</head>

<body>

<h2>Bookmarks</h2>
<div id="bookmarks"></div>

<script>
fetch("bookmarks.html")
  .then(r => r.text())
  .then(text => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, "text/html");
    const root = doc.querySelector("DL");
    const tree = buildList(root);
    document.getElementById("bookmarks").appendChild(tree);
  });

function buildList(dl) {
  const ul = document.createElement("ul");

  let node = dl.firstElementChild;

  while (node) {
    if (node.tagName === "DT") {
      const li = document.createElement("li");

      const folder = node.querySelector("H3");
      const link = node.querySelector("A");

      if (folder) {
        const toggle = document.createElement("span");
        toggle.textContent = "▶";
        toggle.className = "toggle";

        const title = document.createElement("span");
        title.textContent = folder.textContent;
        title.className = "folder";

        li.appendChild(toggle);
        li.appendChild(title);

        const next = node.nextElementSibling;
        if (next && next.tagName === "DL") {
          const childList = buildList(next);
          childList.classList.add("nested");
          li.appendChild(childList);

          toggle.onclick = () => {
            childList.classList.toggle("open");
            toggle.textContent =
              childList.classList.contains("open") ? "▼" : "▶";
          };
        }
      }

      if (link) {
        const a = document.createElement("a");
        a.href = link.href;
        a.textContent = link.textContent;
        a.className = "bookmark";
        a.target = "_blank";
        li.appendChild(a);
      }

      ul.appendChild(li);
    }

    node = node.nextElementSibling;
  }

  return ul;
}
</script>

</body>
</html>

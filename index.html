<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Bookmarks</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 40px;
  background: #f5f5f5;
}

h1 {
  margin-bottom: 10px;
}

#search {
  padding: 8px;
  width: 300px;
  margin-bottom: 20px;
}

ul {
  list-style-type: none;
  padding-left: 20px;
}

li {
  margin: 4px 0;
}

.folder {
  cursor: pointer;
  font-weight: bold;
}

.nested {
  display: none;
  margin-left: 15px;
}

.active {
  display: block;
}

a {
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h1>My Bookmarks</h1>
<input type="text" id="search" placeholder="Search bookmarks...">

<div id="bookmarks"></div>

<script>
// Load bookmarks file
fetch('bookmarks.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('bookmarks').innerHTML = data;
    makeFoldersCollapsible();
    enableSearch();
  });

function makeFoldersCollapsible() {
  document.querySelectorAll("dt > h3").forEach(folder => {
    folder.classList.add("folder");
    let next = folder.parentElement.nextElementSibling;
    if (next) {
      next.classList.add("nested");
      folder.onclick = () => next.classList.toggle("active");
    }
  });
}

function enableSearch() {
  const search = document.getElementById("search");
  search.addEventListener("keyup", function() {
    let filter = search.value.toLowerCase();
    document.querySelectorAll("a").forEach(link => {
      if (link.textContent.toLowerCase().includes(filter))
        link.style.display = "";
      else
        link.style.display = "none";
    });
  });
}
</script>

</body>
</html>
